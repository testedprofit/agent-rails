name: Feature request
description: Suggest a new check, policy pack, or workflow improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What AI-assisted repo risk or workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Agent Rails do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - GitHub Action
        - Documentation
        - Secret scanning
        - Risk review
        - Policy packs
        - Other
    validations:
      required: true
