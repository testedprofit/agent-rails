name: Agent Rails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Guardrail checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Agent Rails
        run: python -m pip install -e .

      - name: Run checks
        run: agent-rails check --report agent-rails-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-rails-report
          path: agent-rails-report.md

